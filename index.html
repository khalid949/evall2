<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>التقييم النهائي للمراكز</title>
    <style>
        :root { --primary-red: #d32f2f; --dark-blue: #2c3e50; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; direction: rtl; }
        .container { width: 98%; max-width: 1200px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 10px solid var(--primary-red); }
        
        .header { display: flex; align-items: center; justify-content: space-between; border-bottom: 3px solid #eee; padding-bottom: 20px; margin-bottom: 30px; }
        .logo { max-width: 150px; height: auto; }
        .header-title { text-align: center; flex-grow: 1; }
        .header-title h1 { color: var(--dark-blue); margin: 0; font-size: 26px; border: 2px solid var(--dark-blue); padding: 10px; display: inline-block; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background-color: var(--dark-blue); color: white; padding: 15px; border: 1px solid #000; font-size: 16px; }
        td { border: 1px solid #000; padding: 12px; text-align: center; font-size: 16px; font-weight: bold; }
        tr:nth-child(even) { background-color: #f8f9fa; }

        .input-score { width: 70px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; text-align: center; font-weight: bold; font-size: 16px; }
        .avg-cell { font-weight: bold; color: var(--primary-red); font-size: 18px; background-color: #fff9c4; }
        
        /* تنسيق شارات التصنيف */
        .status-badge { padding: 6px 12px; border-radius: 20px; font-weight: bold; font-size: 14px; display: inline-block; min-width: 90px; border: 1px solid; text-align: center; }
        .status-excellent { background: #1b5e20; color: white; border-color: #1b5e20; }
        .status-vgood { background: #4caf50; color: white; border-color: #4caf50; }
        .status-good { background: #fff176; color: #f57f17; border-color: #fbc02d; }
        .status-fair { background: #ffcc80; color: #e65100; border-color: #ef6c00; }
        .status-weak { background: #ffcdd2; color: #b71c1c; border-color: #b71c1c; }

        .btn-print { display: block; width: 250px; margin: 30px auto; padding: 15px; background: var(--primary-red); color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-print:hover { background: #b71c1c; transform: translateY(-2px); }
        
        @media print { .btn-print { display: none; } .container { box-shadow: none; border: none; width: 100%; } input { border: none !important; appearance: none; -moz-appearance: textfield; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="logo.png" alt="شعار الهيئة" class="logo">
        <div class="header-title">
            <h1>التقييم النهائي للمراكز</h1>
        </div>
        <div style="width:150px"></div>
    </div>

    <table>
        <thead>
            <tr>
                <th>المركز</th>
                <th>الفئة أ (100)</th>
                <th>الفئة ب (100)</th>
                <th>الفئة ج (100)</th>
                <th>متوسط المركز</th>
                <th>التصنيف</th>
            </tr>
        </thead>
        <tbody>
            <script>
                // المراكز الثمانية المطلوبة 
                const centers = ["مركز الصجعة", "مركز مويلح", "مركز سمنان", "مركز الإدارة", "مركز الميناء", "مركز الحمرية", "مركز الذيد", "مركز المدام"];
                centers.forEach((center, index) => {
                    document.write(`
                        <tr>
                            <td>${center}</td>
                            <td><input type="number" class="input-score c-${index}" oninput="calculate(${index})" max="100"> / 100</td>
                            <td><input type="number" class="input-score c-${index}" oninput="calculate(${index})" max="100"> / 100</td>
                            <td><input type="number" class="input-score c-${index}" oninput="calculate(${index})" max="100"> / 100</td>
                            <td class="avg-cell" id="avg-${index}">0%</td>
                            <td id="rank-${index}">-</td>
                        </tr>
                    `);
                });
            </script>
        </tbody>
    </table>

    <button class="btn-print" onclick="window.print()">طباعة التقرير / حفظ PDF</button>
</div>

<script>
    function calculate(idx) {
        let inputs = document.querySelectorAll('.c-' + idx);
        let sum = 0;
        let count = 0;
        inputs.forEach(input => {
            if(input.value !== "") {
                sum += parseFloat(input.value);
                count++;
            }
        });
        
        let avg = count > 0 ? (sum / count).toFixed(1) : 0;
        document.getElementById('avg-' + idx).innerText = avg + "%";
        
        let rankCell = document.getElementById('rank-' + idx);
        
        // تطبيق المعايير (جيد جداً يبدأ من 80)
        if(avg >= 90) { rankCell.innerHTML = '<span class="status-badge status-excellent">ممتاز</span>'; }
        else if(avg >= 80) { rankCell.innerHTML = '<span class="status-badge status-vgood">جيد جداً</span>'; }
        else if(avg >= 70) { rankCell.innerHTML = '<span class="status-badge status-good">جيد</span>'; }
        else if(avg >= 60) { rankCell.innerHTML = '<span class="status-badge status-fair">مقبول</span>'; }
        else if(avg > 0) { rankCell.innerHTML = '<span class="status-badge status-weak">ضعيف</span>'; }
        else { rankCell.innerText = "-"; }
    }
</script>

</body>
</html>
